<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Offer</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
margin:0;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* Container */

.container{
width:90%;
}

/* Huge headline */

h1{
font-size:12vw;
font-weight:900;
color:#ff0033;
text-shadow:0 0 25px rgba(255,0,0,0.8);
}

/* Offer text */

.offer{
font-size:4vw;
margin-bottom:40px;
font-weight:bold;
}

/* Payment button */

.paybtn{
padding:22px 60px;
font-size:28px;
font-weight:bold;
background:#ff0033;
color:white;
border:none;
border-radius:14px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px rgba(255,0,0,0.7);
}

.paybtn:hover{
transform:scale(1.1);
background:#cc0029;
box-shadow:0 0 40px rgba(255,0,0,1);
}

.note{
margin-top:20px;
font-size:16px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>LIVE OFFER</h1>

<p class="offer">
Pay ₹99 For Lifetime Access<br>
Private Videos
</p>

<button id="paybtn" class="paybtn">
Pay ₹99 Now
</button>

<p class="note">
Secure payment powered by Razorpay
</p>

</div>

<script>

var options = {

key: "rzp_live_SQBDiRRFf79VdN",

amount: "99",

currency: "INR",

name: "Premium Videos",

description: "Lifetime Access",

handler: function (response){

window.location.href = "videos.html";

}

};

var rzp = new Razorpay(options);

document.getElementById("paybtn").onclick = function(e){

rzp.open();

e.preventDefault();

}

</script>

</body>
</html>
