<!DOCTYPE html>

<html>
<head>
<title>UPI Payment</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:80px;
}

img{
width:220px;
margin-top:20px;
}

input{
padding:12px;
width:260px;
margin-top:25px;
font-size:16px;
}

button{
padding:15px 35px;
margin-top:20px;
background:red;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Pay ₹99 to Unlock Videos</h1>

<p>Scan QR or pay via UPI</p>

<img src="qr.png">

<br>

<input id="txnid" placeholder="ghapa@ptaxis">

<br>

<button onclick="verifyPayment()">
Verify Payment
</button>

<script>

function verifyPayment(){

var txn = document.getElementById("txnid").value;

/* basic UPI txn format check */

if(txn.length < 8){

alert("Invalid Transaction ID");

return;

}

/* unlock videos */

localStorage.setItem("paid","yes");

window.location.href = "videos.html";

}

</script>

</body>
</html>
