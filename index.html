<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Video Collection</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;
}

/* Background video */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* Dark overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* Center content */

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

/* Big title */

h1{
font-size:9vw;
font-weight:900;
margin-bottom:15px;
}

/* Subtitle */

p{
font-size:3vw;
margin-bottom:40px;
font-weight:bold;
}

/* Button */

button{
padding:18px 45px;
font-size:20px;
background:#ff0033;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#cc0029;
transform:scale(1.1);
}

</style>

</head>
  
<script>

// random viewer counter
function updateViewers(){

var viewers = Math.floor(Math.random() * 70) + 90;

document.getElementById("viewers").innerHTML =
"🔥 " + viewers + " people watching this page now";

}

setInterval(updateViewers,4000);
updateViewers();


// random timer 1-5 minutes
var time = Math.floor(Math.random()*240)+60;

function updateTimer(){

var minutes = Math.floor(time/60);
var seconds = time%60;

document.getElementById("timer").innerHTML =
"Offer ends in " +
minutes.toString().padStart(2,'0') + ":" +
seconds.toString().padStart(2,'0');

if(time>0){
time--;
}else{
time = Math.floor(Math.random()*240)+60;
}

}

setInterval(updateTimer,1000);
updateTimer();

<body>

<video autoplay muted loop playsinline>
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">

<h1>Exclusive Premium Indian mms Videos</h1>

<p>Watch Private Premium Content Instantly</p>
<div id="viewers">🔥 128 people watching this page now</div>
<a href="payment.html">

<button id="offerBtn">

<div class="price">
<s>₹499</s> ₹99
</div>

<div id="timer">Offer ends in 02:00</div>

<div class="limited">LIMITED OFFER</div>

</button>

</a>

</div>


</html>
