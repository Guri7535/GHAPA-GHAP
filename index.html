<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Video Collection</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
height:100vh;
background-image:url('background.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* Dark overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

/* Center content */

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

/* Huge title */

h1{
font-size:10vw;
font-weight:900;
margin-bottom:10px;
line-height:1.1;
}

/* Subtitle */

p{
font-size:4vw;
margin-bottom:40px;
font-weight:bold;
}

/* Button */

button{
padding:18px 40px;
font-size:20px;
background:#ff0033;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#cc0029;
transform:scale(1.08);
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="content">

<h1>Exclusive Premium Videos</h1>

<p>Watch Private Premium Content Instantly</p>

<a href="payment.html">
<button>Unlock All Videos ₹99</button>
</a>

</div>

</body>
</html>
