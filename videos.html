<!DOCTYPE html>

<html>
<head>
<title>Video Library</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:40px;
}

iframe{
width:100%;
height:200px;
}

</style>

</head>

<body>

<h1 style="text-align:center;">Premium Video Library</h1>

<div class="grid" id="videos"></div>

<script>

var videos = JSON.parse(localStorage.getItem("videos")) || [];

var html="";

videos.forEach(function(v){

html += `
<div>
<iframe src="${v.link}" allowfullscreen></iframe>
<p>${v.title}</p>
</div>
`;

});

document.getElementById("videos").innerHTML = html;

</script>

</body>
</html>
